version: v1
address: 0.0.0.0:7373

tls:
  key:  /certs/kes-server.key
  cert: /certs/kes-server.crt
  ca:   /certs/ca.crt

admin:
  # Dedicated admin identity — distinct from the MinIO policy identity.
  # KES rejects configs where the same identity appears in both admin and a policy.
  identity: b821fcde0ad1c4a64b67a7ff5756a8baf984b029e40872a69fcc2af44abb2eac

policy:
  minio:
    allow:
      - /v1/key/create/*
      - /v1/key/generate/*
      - /v1/key/decrypt/*
      - /v1/key/bulk/decrypt
      - /v1/key/list/*
      - /v1/status
      - /v1/metrics
    identities:
      - 025f8e75ce1bdbe99fa3b1225c31e43357a7f7aa487a00ba0bfd20a0d449f4c9

keystore:
  fs:
    path: /data   # keys are stored in the container's /data tmpfs
