version: v1
address: 0.0.0.0:7373

tls:
  key:  /certs/kes-server.key
  cert: /certs/kes-server.crt
  ca:   /certs/ca.crt

admin:
  # Dedicated admin identity — distinct from the MinIO policy identity.
  # KES rejects configs where the same identity appears in both admin and a policy.
  identity: 6da24981a96568bc90e976abd2bebbdd5d0ce25761fd106f2e1dc72b1bc9ab15

policy:
  minio:
    allow:
      - /v1/key/create/*
      - /v1/key/generate/*
      - /v1/key/decrypt/*
      - /v1/key/bulk/decrypt
      - /v1/key/list/*
      - /v1/status
      - /v1/metrics
    identities:
      - 3a32edbc0c614c1595e9e42dfda1ff00e82084f9f1053f5621014b32fd15a00c

keystore:
  fs:
    path: /data   # keys are stored in the container's /data tmpfs
