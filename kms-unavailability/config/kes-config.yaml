version: v1
address: 0.0.0.0:7373

tls:
  key:  /certs/kes-server.key
  cert: /certs/kes-server.crt
  ca:   /certs/ca.crt

admin:
  # Dedicated admin identity — distinct from the MinIO policy identity.
  # KES rejects configs where the same identity appears in both admin and a policy.
  identity: 14e1d96b6f8a7ef45fb2fbd7e5769171472617923baefea7357ed800988a72f8

policy:
  minio:
    allow:
      - /v1/key/create/*
      - /v1/key/generate/*
      - /v1/key/decrypt/*
      - /v1/key/bulk/decrypt
      - /v1/key/list/*
      - /v1/status
      - /v1/metrics
    identities:
      - ab69f7bd2c7146068f044f6a224ce25bdb4b0aec0f6c2e61911a31f8ca5b1ef9

keystore:
  fs:
    path: /data   # keys are stored in the container's /data tmpfs
